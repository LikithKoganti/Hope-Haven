  <main class="application-page">

    <h1>Volunteer Application</h1>
    <p class="app-description">
      Thank you for your interest in becoming a volunteer at Hope Haven.
      Please complete the application below and our team will contact you soon.
    </p>

    <form class="application-form">

      <label>Full Name</label>
      <input type="text" required>

      <label>Email Address</label>
      <input type="email" required>

      <label>Phone Number</label>
      <input type="text" required>

      <label>Preferred Volunteer Role</label>
      <select required>
        <option value="">Select a role</option>
        <option>Shelter Support</option>
        <option>Food & Meal Programs</option>
        <option>Community Outreach</option>
        <option>Grounds / Seasonal Projects</option>
      </select>

      <label>Availability</label>
      <input type="text" placeholder="Weekends, Evenings, Flexible">

      <label>Why do you want to volunteer?</label>
      <textarea rows="4"></textarea>

      <label>Additional Notes</label>
      <textarea rows="3"></textarea>

      <button type="submit" class="btn-submit-app">Submit Application</button>

    </form>

  </main>

</body>
</html>
