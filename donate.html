<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hope Haven – Donate</title>
  <link rel="stylesheet" href="styles.css">

  <style>
    body {
      background-color: #f5f7f5;
    }

    .donation-container {
      max-width: 700px;
      margin: 40px auto;
      padding: 30px;
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }

    .donation-container h1 {
      text-align: center;
      color: #14532d;
      margin-bottom: 10px;
    }

    .donation-container p {
      text-align: center;
      color: #555;
      margin-bottom: 20px;
      font-size: 15px;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    input, select, textarea {
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 15px;
      width: 100%;
    }

    textarea {
      height: 120px;
      resize: vertical;
    }

    .submit-btn {
      padding: 12px;
      background: #15803d;
      border: none;
      color: #fff;
      font-size: 17px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }

    .submit-btn:hover {
      background: #0f6c32;
    }
  </style>
</head>

<body>

<!-- HEADER (same as all pages) -->
<header class="main-header">
  <a href="index.html">
    <img src="hopehaveimg.png" class="header-logo" alt="Hope Haven Logo">
  </a>

  <nav class="header-nav">
    <a href="Find Resources.html">Find Resources</a>
    <a href="volunteer-donate.html">Volunteer & Donate</a>
    <a href="about.html">About Us</a>
    <a href="Community Stories.html">Community Stories</a>
    <a href="contact.html">Contact</a>
    <a href="Planning.html">Planning Analysis</a>
    <a href="Market Risks.html">Market Risks</a>    
    <a href="Reflection.html">Reflections</a>
  </nav>

  
</header>


<!-- DONATION FORM -->
<div class="donation-container">
  <h1>Make a Donation</h1>
  <p>Your support helps provide shelter, food, and hope to families across Connecticut.</p>

  <form action="#" method="POST">

    <input type="text" placeholder="Full Name" required>

    <input type="email" placeholder="Email Address" required>

    <select required>
      <option value="">Select Donation Amount</option>
      <option>$10</option>
      <option>$25</option>
      <option>$50</option>
      <option>$100</option>
      <option>$250</option>
      <option>Other Amount</option>
    </select>

    <select required>
      <option value="">Payment Method</option>
      <option>Credit / Debit Card</option>
      <option>PayPal</option>
      <option>Online Banking</option>
    </select>

    <textarea placeholder="Optional Message"></textarea>

    <button type="submit" class="submit-btn">Submit Donation</button>

  </form>
</div>

</body>
</html>
